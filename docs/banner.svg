<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4655;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8fa3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4655;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ff4655;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" />

  <!-- Glow blob -->
  <ellipse cx="600" cy="140" rx="400" ry="120" fill="url(#glow)" filter="url(#blur)" />

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70" />
    <line x1="0" y1="140" x2="1200" y2="140" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="200" y1="0" x2="200" y2="280" />
    <line x1="400" y1="0" x2="400" y2="280" />
    <line x1="600" y1="0" x2="600" y2="280" />
    <line x1="800" y1="0" x2="800" y2="280" />
    <line x1="1000" y1="0" x2="1000" y2="280" />
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" />

  <!-- VLR monogram -->
  <text x="60" y="130" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="52" fill="url(#accent)" letter-spacing="-2">VLR</text>

  <!-- Divider dot -->
  <circle cx="162" cy="110" r="4" fill="#ff4655" opacity="0.6" />

  <!-- Main title -->
  <text x="60" y="168" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="6" opacity="0.95">STATS DASHBOARD</text>

  <!-- Subtitle -->
  <text x="60" y="205" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="15" fill="#8b9bbf" letter-spacing="1">Self-hosted Valorant esports analytics · VCT · Challengers · Game Changers · 2021–present</text>

  <!-- Right side — stat pills -->
  <g transform="translate(820, 90)">
    <!-- Players pill -->
    <rect x="0" y="0" width="120" height="36" rx="6" fill="#1e2235" />
    <text x="14" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b9bbf" font-weight="600" letter-spacing="1">PLAYERS</text>
    <text x="14" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ff4655" font-weight="700">6,000+</text>

    <!-- Teams pill -->
    <rect x="136" y="0" width="120" height="36" rx="6" fill="#1e2235" />
    <text x="150" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b9bbf" font-weight="600" letter-spacing="1">TEAMS</text>
    <text x="150" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ff4655" font-weight="700">78+</text>

    <!-- Seasons pill -->
    <rect x="0" y="50" width="120" height="36" rx="6" fill="#1e2235" />
    <text x="14" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b9bbf" font-weight="600" letter-spacing="1">SEASONS</text>
    <text x="14" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4ade80" font-weight="700">2021 – 2026</text>

    <!-- Endpoints pill -->
    <rect x="136" y="50" width="120" height="36" rx="6" fill="#1e2235" />
    <text x="150" y="64" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b9bbf" font-weight="600" letter-spacing="1">API ROUTES</text>
    <text x="150" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4ade80" font-weight="700">20+</text>

    <!-- Tiers pill (wide) -->
    <rect x="0" y="100" width="256" height="36" rx="6" fill="#1e2235" />
    <text x="14" y="114" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b9bbf" font-weight="600" letter-spacing="1">TIERS COVERED</text>
    <text x="14" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">VCT T1 · Challengers · Game Changers</text>
  </g>

  <!-- Bottom left tag -->
  <text x="60" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff4655" font-weight="600" opacity="0.7">Python · Flask · BeautifulSoup · Pandas</text>

  <!-- Bottom border -->
  <rect x="0" y="277" width="1200" height="3" fill="url(#accent)" opacity="0.3" />
</svg>
